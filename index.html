<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time de Vôlei</title>
    <link
      rel="shortcut icon"
      href="https://play-lh.googleusercontent.com/gkwNDUNhTjZVSsjwsc9z-nJVJvDcWX_1XYQ3ZOCIZvdVWw1Gpjw4WGBe3Zv4PZzWTwE=w256"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="haikyuu.css" />
    <script src="./haikyuu.js"></script>
  </head>
  <body>
    <header>
      <div id="lets-go">
        <img
          src="https://logosmarcas.net/wp-content/uploads/2021/09/Haikyuu-Logo.png"
          alt="Papel de parede haikyuu"
          srcset=""
          height="400px"
        />
      </div>

      <div class="h1-time">
        <h1>Escalação de Times</h1>
      </div>

      <div id="h2-papa">
        <h2>Mas eu preferi criar o time de Haikyuu!</h2>
      </div>

      <div class="h3-a">
        <h3>Vamos começar?</h3>
      </div>

      <div class="formulario">
        <label
          >Nome do Jogador:
          <input type="text" id="nome-jogador" placeholder="Ex: Hinata" />
        </label>

        <label
          >Número da Camisa:
          <input type="number" id="numero-jogador" placeholder="Ex: 10" />
        </label>
      </div>

      <div id="butoes">
        <button onclick="addPlayer()">Escalar Jogador</button>
      </div>
    </header>

    <main>
      <section id="player-table"></section>
      <section id="remove-number"></section>
    </main>

    <footer>
      <p>© 2025 JPNC. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
